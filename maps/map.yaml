# [지도 이미지 파일 이름] SLAM으로 그려낸 미로의 실제 그림 파일(png)의 이름입니다.
image: map.png

# [지도 표현 방식] 픽셀을 흑(벽), 백(갈 수 있는 길), 회색(모르는 곳) 3가지로 나누어 인식하는 모드입니다.
mode: trinary

# [해상도] 지도 그림의 1픽셀이 실제 세계에서 몇 미터(m)인지를 뜻합니다. (0.050은 1픽셀 = 5cm 의미)
resolution: 0.050

# [지도의 원점] 실제 미로 세계의 (0, 0) 좌표가 지도 그림 내부에서 어디에 위치하는지 설정합니다. [X축, Y축, 회전]
origin: [-12.647, -14.330, 0]

# [색상 반전 여부] 0으로 설정하면 기본값(흰색은 빈 공간, 검은색은 벽)을 그대로 사용한다는 뜻입니다.
negate: 0

# [벽 판별 기준] 픽셀의 어두운 정도가 65% 이상이면 로봇이 갈 수 없는 '장애물(벽)'로 판단합니다.
occupied_thresh: 0.65

# [빈 공간 판별 기준] 픽셀의 어두운 정도가 19.6% 이하로 밝으면 로봇이 지나갈 수 있는 '안전한 길'로 판단합니다.
free_thresh: 0.196
